name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Node for admin UI build
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Validate (lint, tests, MCP smoke)
        run: ./scripts/validate.sh

# Copie/adapte para ~/.hermes/config.yaml
# Hermes na mesma máquina — MCP stdio apontando para este repo.
# Pré-requisito no repo: uv sync --all-extras

mcp_servers:
  langchain-integrator:
    # Opção A (recomendada): uv gerencia o venv
    command: uv
    args:
      - run
      - --directory
      - /caminho/para/unified-intelligence-platform
      - integrator
      - serve
    env:
      INTEGRATOR_ROOT: /caminho/para/unified-intelligence-platform
      # Fase 2 (opcional): bloquear envio/apagar até o agente pedir confirm=true
      # INTEGRATOR_TOOL_DENYLIST: send_gmail_message,delete_calendar_event
      INTEGRATOR_AUDIT_LOG_ENABLED: "true"

  # Opção B: Python do .venv criado por uv sync
  # langchain-integrator-venv:
  #   command: /caminho/para/unified-intelligence-platform/.venv/bin/integrator-serve
